<footer class="site-footer">
  <div class="wrap footer-inner">
    <div>
      <strong>{{ site.author.name }}</strong> · {{ site.author.role }}<br>
      {{ site.author.affiliation }}<br>
      {{ site.email }}
    </div>
    <div class="footer-links">
      <a href="{{ site.cv_pdf | relative_url }}" target="_blank" rel="noopener">CV</a>
      <a href="{{ site.lab_url }}" target="_blank" rel="noopener">Lab</a>
      <a href="{{ site.scholar_url }}" target="_blank" rel="noopener">Scholar</a>
      <a href="{{ site.linkedin_url }}" target="_blank" rel="noopener">LinkedIn</a>
    </div>
    <div class="footer-meta">© {{ site.time | date: '%Y' }} {{ site.author.name }} · {{ site.author.affiliation }}</div>
  </div>
</footer>
