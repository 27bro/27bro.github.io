{% if site.feedback.enabled != false %}
<section id="feedback" class="section section-alt feedback-section">
  <div class="wrap feedback-wrap">
    <h2 class="section-title">Send a message</h2>
    <p class="section-desc">
      Questions or comments about this page? Write below and it goes straight to my email.
    </p>

    <form class="feedback-form"
          action="https://formsubmit.co/{{ site.email }}"
          method="POST">
      <input type="hidden" name="_subject" value="[{{ site.author.name }} site] {{ page.title | default: 'About' }}">
      <input type="hidden" name="page" value="{{ site.url }}{{ page.url }}">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_captcha" value="false">
      <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">
      <input type="hidden" name="_next" value="{{ site.url }}{{ page.url }}?sent=1#feedback">

      <div class="feedback-form-grid">
        <label class="feedback-field">
          <span>Name</span>
          <input type="text" name="name" maxlength="80" required placeholder="Your name">
        </label>
        <label class="feedback-field">
          <span>Your email</span>
          <input type="email" name="email" maxlength="120" required placeholder="you@example.com">
        </label>
      </div>
      <label class="feedback-field">
        <span>Message</span>
        <textarea name="message" rows="5" maxlength="4000" required placeholder="Write your message…"></textarea>
      </label>
      <div class="feedback-form-actions">
        <button type="submit" class="btn btn-primary">Send email</button>
        <p class="feedback-status" id="feedback-sent-note" hidden>Thanks — your message was sent.</p>
      </div>
    </form>
  </div>
</section>
<script>
(function () {
  if (new URLSearchParams(window.location.search).get("sent") === "1") {
    var note = document.getElementById("feedback-sent-note");
    if (note) note.hidden = false;
  }
})();
</script>
{% endif %}
