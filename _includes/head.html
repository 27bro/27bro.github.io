<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b1f3a">
  {%- if site.noindex -%}
  <meta name="robots" content="noindex, nofollow">
  {%- endif -%}

  {%- if page.title -%}
    <title>{{ page.title }} · {{ site.author.name }}</title>
  {%- else -%}
    <title>{{ site.title }} · {{ site.author.name }}</title>
  {%- endif -%}

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,opsz@0,6..72;1,6..72&display=swap" rel="stylesheet">

  {%- if page.math -%}
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async></script>
  {%- endif -%}

  {%- feed_meta -%}
  {%- seo -%}
</head>
