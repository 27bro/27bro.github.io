<section id="contact" class="section section-alt">
  <div class="wrap contact">
    <h2 class="section-title">Contact</h2>
    <p class="lead">Questions or collaboration? Happy to connect.</p>
    <div class="contact-grid">
      <a class="contact-card" href="mailto:{{ site.email }}">
        <span class="c-label">Email</span><span class="c-value">{{ site.email }}</span>
      </a>
      <a class="contact-card" href="{{ site.lab_url }}" target="_blank" rel="noopener">
        <span class="c-label">Lab</span><span class="c-value">Sports Engineering Lab (SEL)</span>
      </a>
      <a class="contact-card" href="{{ site.scholar_url }}" target="_blank" rel="noopener">
        <span class="c-label">Publications</span><span class="c-value">Google Scholar</span>
      </a>
      <a class="contact-card" href="{{ site.linkedin_url }}" target="_blank" rel="noopener">
        <span class="c-label">Network</span><span class="c-value">LinkedIn</span>
      </a>
    </div>
  </div>
</section>
